<!DOCTYPE html>
<html lang="zh">
<head>

    <meta charset="UTF-8">

    <title>最新资源合集｜视频下载工具与教程</title>

    <meta name="description" content="持续更新视频下载工具、教程合集与外部资源，所有内容自动同步更新。">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body style="max-width: 900px; margin: auto; padding: 20px; font-family: Arial; line-height: 1.7;">

<h1>🔥 最新资源合集</h1>

<p>
本页面持续更新视频下载工具、教程与实用资源，
所有内容由 posts.json 自动生成。
</p>

<hr>

<h2>📌 最新更新</h2>

<div id="latest">
加载中...
</div>

<hr>

<h2>📌 使用说明</h2>

<p>
新增内容后，只需更新 input.txt，
系统将自动同步更新页面，无需手动修改 HTML。
</p>

<p>
最新页面：
<a href="https://kejimao.github.io/latest-links/latest.html">
https://kejimao.github.io/latest-links/latest.html
</a>
</p>

<script>

fetch("posts.json?v=" + Date.now())

.then(res => res.json())

.then(data => {

    const latest = document.getElementById("latest");

    latest.innerHTML = "";

    data.forEach(item => {

        latest.innerHTML += `

        <div style="margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid #ddd;">

            <a href="${item.url}" target="_blank" style="text-decoration:none;">

                <h3 style="margin-bottom:8px;">
                    ${item.title}
                </h3>

            </a>

            <p style="color:#555;">
                ${item.desc}
            </p>

        </div>

        `;

    });

})

.catch(error => {

    document.getElementById("latest").innerHTML =
        "posts.json 加载失败";

    console.error(error);

});

</script>

</body>
</html>
