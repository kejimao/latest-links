<body>

<h1>🔥 最新资源合集</h1>

<p>
本页面持续更新视频下载工具、教程与实用资源，
所有内容由 posts.json 自动生成。
</p>

<hr>

<h2>📌 最新更新</h2>
<div id="latest"></div>

<hr>

<h2>📁 GitHub 页面</h2>
<div id="github"></div>

<hr>

<h2>🌐 外部文章</h2>
<div id="external"></div>

<hr>

<h2>📌 使用说明</h2>

<p>
新增内容后，只需更新 input.txt，
系统将自动同步更新页面。
</p>

<script>
fetch("posts.json?v=" + Date.now())
.then(res => res.json())
.then(data => {

    const latest = document.getElementById("latest");
    const github = document.getElementById("github");
    const external = document.getElementById("external");

    latest.innerHTML = "";
    github.innerHTML = "";
    external.innerHTML = "";

    data.forEach(item => {

        const html = `
        <div style="margin-bottom:20px;">
            <a href="${item.url}" target="_blank">
                <h3>${item.title}</h3>
            </a>
            <p>${item.desc}</p>
        </div>
        `;

        // 最新更新
        latest.innerHTML += html;

        // GitHub 分类
        if (
            item.url.includes("github.com") ||
            item.url.includes("github.io")
        ) {
            github.innerHTML += html;
        } else {
            external.innerHTML += html;
        }

    });

});
</script>

</body>
