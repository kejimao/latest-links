name: Full Auto Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1️⃣ 生成 posts.json（关键）
      - name: Generate posts.json
        run: node ai-generate.js

      - name: Commit posts.json
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@example.com"
          git add posts.json
          git diff --cached --quiet && echo "no posts change" && exit 0
          git commit -m "update posts"
          git push

      # 2️⃣ 生成 README
      - name: Generate README
        run: node generate-readme.js

      - name: Commit README
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@example.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "update readme"
          git push
