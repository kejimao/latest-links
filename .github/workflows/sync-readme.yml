name: Auto Sync README

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate README.md safely
        run: |
          node -e "
          const fs = require('fs');

          let posts = [];

          try {
              if (fs.existsSync('posts.json')) {
                  const raw = fs.readFileSync('posts.json','utf-8');
                  posts = JSON.parse(raw || '[]');
              }
          } catch (e) {
              posts = [];
          }

          if (!Array.isArray(posts)) posts = [];

          posts = posts.slice(0, 30);

          let md = '# 🔥 最新资源合集（自动更新）\n\n';
          md += '> 自动同步 posts.json，无需手动维护\n\n';

          if (posts.length === 0) {
              md += '⚠️ 暂无数据，请检查 input.txt 是否已提交\n';
          } else {
              posts.forEach((p, i) => {
                  md += `## ${i+1}. ${p.title || '无标题'}\n`;
                  md += `- 📝 ${p.desc || '暂无描述'}\n`;
                  md += `- 🔗 ${p.url || ''}\n\n`;
              });
          }

          md += '\n---\n';
          md += '👉 最新页面：https://kejimao.github.io/latest-links/latest.html\n';

          fs.writeFileSync('README.md', md);
          "

      - name: Commit README (safe)
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@example.com"

          git add README.md

          git diff --cached --quiet && echo "no changes" && exit 0

          git commit -m "auto update README"
          git push
