name: Auto Sync README

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate README.md
        run: |
          node -e "
          const fs = require('fs');

          let posts = [];

          try {
              posts = JSON.parse(fs.readFileSync('posts.json','utf-8'));
          } catch (e) {
              posts = [];
          }

          if (!Array.isArray(posts)) posts = [];

          let md = '# 🔥 最新资源合集（自动更新）\n\n';

          md += '> 本页面自动生成\n\n';

          posts.slice(0, 30).forEach((p, i) => {
              md += `## ${i+1}. ${p.title || '无标题'}\n`;
              md += `- 📝 ${p.desc || ''}\n`;
              md += `- 🔗 ${p.url || ''}\n\n`;
          });

          fs.writeFileSync('README.md', md);
          "

      - name: Commit README
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@example.com"
          git add README.md
          git commit -m "auto update README" || exit 0
          git push
