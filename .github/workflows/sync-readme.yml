name: Auto Sync README from posts.json

on:
  push:
    paths:
      - posts.json

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate README.md
        run: |
          node -e "
          const fs = require('fs');

          let posts = JSON.parse(fs.readFileSync('posts.json','utf-8'));

          // 🔥 按最新排序（防乱序）
          posts = posts.sort((a,b) => (b.time || 0) - (a.time || 0));

          // 🔥 只取前30条（防README爆炸）
          posts = posts.slice(0, 30);

          let md = '# 🔥 最新资源合集（自动更新）\n\n';
          md += '> 本页面由 posts.json 自动生成，无需手动维护\n\n';

          posts.forEach((p, i) => {
              md += `## ${i+1}. ${p.title}\n`;
              md += `- 📝 ${p.desc}\n`;
              md += `- 🔗 ${p.url}\n\n`;
          });

          md += '\n---\n';
          md += '👉 最新页面：https://kejimao.github.io/latest-links/latest.html\n';

          fs.writeFileSync('README.md', md);
          "

      - name: Commit changes
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@example.com"

          git add README.md
          git commit -m "auto update README" || exit 0
          git push
