const fs = require("fs");

let posts = [];

try {
    if (fs.existsSync("posts.json")) {
        posts = JSON.parse(fs.readFileSync("posts.json", "utf-8"));
    }
} catch (e) {
    console.log("JSON ERROR:", e.message);
    posts = [];
}

if (!Array.isArray(posts)) posts = [];

posts = posts.slice(0, 30);

let md = "# 🔥 最新资源合集（自动更新）\n\n";
md += "> 自动生成，无需手动维护\n\n";

if (posts.length === 0) {
    md += "⚠️ 暂无数据\n";
} else {
    posts.forEach((p, i) => {
        md += `## ${i + 1}. ${p.title || "无标题"}\n`;
        md += `- 📝 ${p.desc || "暂无描述"}\n`;
        md += `- 🔗 ${p.url || ""}\n\n`;
    });
}

md += "\n---\n";
md += "👉 latest: https://kejimao.github.io/latest-links/latest.html\n";

fs.writeFileSync("README.md", md);
console.log("README generated:", posts.length);
