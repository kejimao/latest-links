name: Auto Sync

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ 必须有
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 1️⃣ 生成数据
      - name: Run generator
        run: node ai-generate.js

      # 2️⃣ 强制提交（关键优化）
      - name: Commit & Push
        run: |
          git config user.name "auto-bot"
          git config user.email "bot@example.com"

          git add posts.json README.md

          # 🔥 强制 commit（不再 silently skip）
          git commit -m "auto sync update" || echo "no changes"

          git push
