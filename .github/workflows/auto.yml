name: Auto Generate Posts

on:
  push:
    branches:
      - main

permissions:
  contents: write   # 🔥 关键修复

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        run: node ai-generate.js

      - name: Commit changes
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@example.com"
          git add posts.json
          git commit -m "auto update" || exit 0
          git push
